<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>메자닌 종목정보 관리</title>
<style>:root{--deep:#004d40;--line:#087061;--bg:#eef5f3}*{box-sizing:border-box}body{margin:0;font:11px "Malgun Gothic",sans-serif;background:var(--bg);color:#173a34;overflow:hidden}header{height:66px;background:#fff;border-bottom:9px solid var(--deep);display:flex;align-items:center;padding:0 14px;gap:8px}h1{margin:0 16px 0 0;font-size:24px;white-space:nowrap}button,a{border:1px solid var(--line);border-radius:4px;background:#eef7f4;color:#073f37;padding:7px 10px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:var(--deep);color:#fff}.status{margin-left:auto}.toolbar{height:48px;display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff}.toolbar input{width:260px}.toolbar select{width:100px}input,select{border:1px solid #a0bdb7;border-radius:3px;padding:5px;background:#fff}.legend{margin-left:auto;display:flex;gap:9px}.legend i{width:12px;height:12px;display:inline-block;border:1px solid #aac0bb;vertical-align:-2px;margin-right:3px}.manualKey,.cell.dirty{background:#fff3c4!important}.autoKey{background:#d9ecff}.sheet{height:calc(100vh - 114px);overflow:auto;background:#fff;border-top:1px solid var(--line)}table{border-collapse:separate;border-spacing:0;min-width:2700px;width:max-content}th{position:sticky;top:0;z-index:4;background:var(--deep);color:#fff;height:29px;padding:4px 6px;border-right:1px solid #a9cfc7;white-space:nowrap}td{height:27px;padding:0;border-right:1px dotted #91a9a4;border-bottom:1px dotted #91a9a4}tr:nth-child(even) td{background:#f5f8f7}tr.selected td{background:#d7ece7!important}.selectCol{position:sticky;left:0;z-index:5;width:42px;min-width:42px;text-align:center;background:#e3f0ed!important}.pick{width:16px;height:16px;accent-color:var(--deep)}.cell{width:112px;height:26px;border:0;border-radius:0;padding:3px 5px;background:transparent;font:11px "Malgun Gothic",sans-serif}.cell.wide{width:170px}.cell.date{width:105px}.cell.num{width:90px}.cell.center{text-align:center}.cell.delta{color:#075fba;font-weight:800}.modalBack{display:none;position:fixed;inset:0;background:#00231e73;z-index:20;align-items:center;justify-content:center}.modalBack.open{display:flex}.modal{width:min(620px,94vw);max-height:82vh;overflow:auto;background:#fff;border:2px solid var(--deep);border-radius:10px;padding:14px}.modalHead{display:flex;align-items:center;gap:8px}.modalHead h2{margin:0;flex:1}.rule{background:#eef7f4;padding:9px;border-radius:5px;line-height:1.55;margin:10px 0}.matchList label{display:grid;grid-template-columns:35px 1.3fr 1fr 65px 65px;gap:8px;padding:9px;border-bottom:1px solid #d8e5e2;align-items:center}.modalFoot{display:flex;justify-content:flex-end;margin-top:10px}</style></head><body>
<header><h1>메자닌 종목정보 관리</h1><a href="../mezzanine/">대시보드</a><button class="primary" id="save">변경사항 저장</button><button id="findSame">동일종목 찾기</button><a href="../mezzanine-disclosures/">공시정보조회</a><span class="status" id="status">불러오는 중…</span></header>
<div class="toolbar"><input id="search" placeholder="종목명·발행사·코드 검색"><select id="type"><option value="">전체 유형</option><option>CB</option><option>BW</option><option>EB</option></select><button id="clearFilter">필터 초기화</button><span id="count"></span><div class="legend"><span><i class="autoKey"></i>원본값</span><span><i class="manualKey"></i>수정값</span></div></div>
<main class="sheet"><table><thead><tr id="headers"></tr></thead><tbody id="rows"></tbody></table></main>
<div class="modalBack" id="matchModal"><section class="modal"><div class="modalHead"><h2>동일종목 후보</h2><button id="closeMatch">닫기</button></div><div class="rule" id="matchGuide"></div><div class="matchList" id="matchList"></div><div class="modalFoot"><button class="primary" id="applyMatch">선택 종목 정보 가져오기</button></div></section></div>
<script type="module">
const URL='https://esqakvzvchcunhzjlyry.supabase.co',KEY='sb_publishable_T0q_8mB9yzcitTL7HH0SuA_W4DUcVtP',$=s=>document.querySelector(s);let client,user,rows=[],cols=[],selected='',dirty=new Set();
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pct=new Set(['델타','Coupon','YTM','리픽싱','CALL범위']),nums=new Set(['발행금액','최초전환가','전환가','Floor']);
function show(c,v){if(v==null||v==='')return'';if(c==='CALL')return String(v).slice(0,10);let n=Number(String(v).replace(/,/g,''));if(c==='델타'||c==='Coupon'||c==='YTM')return Number.isFinite(n)?(n*100).toFixed(1)+'%':v;if(c==='리픽싱')return Number.isFinite(n)?Math.round(n*100)+'%':v;if(c==='CALL범위')return Number.isFinite(n)?(n*100).toLocaleString('ko-KR')+'%':v;if(nums.has(c))return Number.isFinite(n)?n.toLocaleString('ko-KR'):v;return v}
function cellClass(c){let a=[];if(['메자닌종목명','발행사명','교환대상명'].includes(c))a.push('wide');if(c.includes('일자')||c==='PUT'||c==='CALL')a.push('date');if([...pct,...nums,'회차','PUT주기'].includes(c))a.push('num');if(cols.indexOf(c)>=cols.indexOf('회차'))a.push('center');if(c==='델타')a.push('delta');return a.join(' ')}
function filtered(){let q=$('#search').value.toLowerCase(),t=$('#type').value;return rows.filter(r=>(!t||r.payload['구분']===t)&&(!q||[r.payload['메자닌종목명'],r.payload['발행사명'],r.payload['KR코드'],r.payload['교환대상명']].join(' ').toLowerCase().includes(q)))}
function render(){let list=filtered();$('#headers').innerHTML='<th class="selectCol">선택</th>'+cols.map(c=>`<th>${esc(c)}</th>`).join('');$('#rows').innerHTML=list.map((r,i)=>`<tr data-no="${r.row_no}" class="${selected===r.row_no?'selected':''}"><td class="selectCol"><input class="pick" type="radio" name="pick" ${selected===r.row_no?'checked':''}></td>${cols.map(c=>`<td><input class="cell ${cellClass(c)} ${dirty.has(r.row_no)?'dirty':''}" data-field="${esc(c)}" value="${esc(show(c,r.payload[c]))}" ${c==='델타'?'readonly':''}></td>`).join('')}</tr>`).join('');$('#count').textContent=`${list.length} / ${rows.length}개`;$('#status').textContent=dirty.size?`${dirty.size}개 종목 저장 대기`:user?`${rows.length}개 종목`:'로그인이 필요합니다.'}
async function load(){const {createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');client=createClient(URL,KEY,{auth:{persistSession:true,autoRefreshToken:true}});user=(await client.auth.getSession()).data.session?.user;if(!user)throw Error('메인 화면에서 로그인한 뒤 다시 열어주세요.');let out=[];for(let start=0;;start+=1000){let {data,error}=await client.from('manual_file_rows').select('row_no,payload').eq('domain','mezzanine').eq('file_key','instrument_info').order('row_no').range(start,start+999);if(error)throw error;out.push(...data);if(data.length<1000)break}rows=out;cols=rows.length?Object.keys(rows[0].payload):[];let p=new URLSearchParams(location.search),name=p.get('newName');if(name){let payload=Object.fromEntries(cols.map(c=>[c,'']));Object.assign(payload,{메자닌종목명:name,KR코드:p.get('newCode')||'',구분:p.get('newType')||'',발행사명:p.get('newIssuer')||'',발행코드:p.get('newIssuerCode')||''});let no=Math.max(0,...rows.map(r=>r.row_no))+1;rows.unshift({row_no:no,payload});selected=no;dirty.add(no)}render()}
$('#rows').onchange=e=>{if(e.target.classList.contains('pick')){selected=Number(e.target.closest('tr').dataset.no);render()}};$('#rows').onfocusin=e=>{let c=e.target.dataset.field;if(!c||c==='델타')return;let r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no)),v=r.payload[c];e.target.value=pct.has(c)&&v!==''?Number(v)*100:String(v??'').replace(/,/g,'')};$('#rows').oninput=e=>{let c=e.target.dataset.field;if(!c||c==='델타')return;let r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no)),raw=e.target.value.replace(/[,%]/g,'');r.payload[c]=pct.has(c)&&raw!==''?Number(raw)/100:raw;dirty.add(r.row_no);render()};$('#rows').onfocusout=e=>{let c=e.target.dataset.field,r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no));if(c&&r)e.target.value=show(c,r.payload[c])};
function key(v){return String(v||'').toLowerCase().replace(/제?\d+회|\d+(cb|bw|eb)|cb|bw|eb|전환|콜|call|행사/g,'').replace(/[^0-9a-z가-힣]/g,'')}function score(a,b){a=key(a);b=key(b);if(!a||!b)return 0;if(a===b)return 1;let A=new Set([...Array(Math.max(0,a.length-1))].map((_,i)=>a.slice(i,i+2))),B=new Set([...Array(Math.max(0,b.length-1))].map((_,i)=>b.slice(i,i+2)));return A.size&&B.size?2*[...A].filter(x=>B.has(x)).length/(A.size+B.size):0}
$('#findSame').onclick=()=>{let t=rows.find(x=>x.row_no===selected);if(!t)return $('#status').textContent='먼저 종목을 선택하세요.';let candidates=rows.filter(x=>x!==t).map(x=>({x,s:score(t.payload['메자닌종목명'],x.payload['메자닌종목명'])+(t.payload['발행사명']===x.payload['발행사명']?.25:0)})).filter(x=>x.s>.18).sort((a,b)=>b.s-a.s).slice(0,10);$('#matchGuide').textContent=`${t.payload['메자닌종목명']}과 이름이 비슷한 기존 등록 종목입니다.`;$('#matchList').innerHTML=candidates.map((v,i)=>`<label><input type="radio" name="same" value="${v.x.row_no}" ${i?'':'checked'}><b>${esc(v.x.payload['메자닌종목명'])}</b><span>${esc(v.x.payload['발행사명'])}</span><span>${esc(v.x.payload['구분'])}</span><span>${esc(v.x.payload['회차'])}회</span></label>`).join('')||'<div class="rule">비슷한 종목을 찾지 못했습니다.</div>';$('#matchModal').classList.add('open')};$('#applyMatch').onclick=()=>{let p=document.querySelector('input[name=same]:checked'),t=rows.find(x=>x.row_no===selected);if(!p||!t)return;let s=rows.find(x=>x.row_no===Number(p.value)),keep={메자닌종목명:t.payload['메자닌종목명'],KR코드:t.payload['KR코드']};for(let c of cols)if(c!=='델타')t.payload[c]=s.payload[c]??'';Object.assign(t.payload,keep);dirty.add(t.row_no);$('#matchModal').classList.remove('open');render()};$('#closeMatch').onclick=()=>$('#matchModal').classList.remove('open');
$('#save').onclick=async()=>{if(!user)return;let changed=rows.filter(r=>dirty.has(r.row_no)).map(r=>({domain:'mezzanine',file_key:'instrument_info',file_label:'종목정보.xlsx',sheet_name:'Sheet1',row_no:r.row_no,payload:r.payload,created_by:user.id,updated_at:new Date().toISOString()}));let {error}=await client.from('manual_file_rows').upsert(changed,{onConflict:'domain,file_key,sheet_name,row_no'});if(error)throw error;dirty.clear();history.replaceState({},'',location.pathname);render();$('#status').textContent='Supabase 저장 완료'};$('#search').oninput=render;$('#type').onchange=render;$('#clearFilter').onclick=()=>{$('#search').value=$('#type').value='';render()};load().catch(e=>$('#status').textContent=e.message);
</script></body></html>
