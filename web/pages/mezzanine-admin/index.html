<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>메자닌 종목정보 관리</title>
<style>
:root{--deep:#004d40;--line:#087061;--bg:#eef5f3}*{box-sizing:border-box}body{margin:0;font:11px "Malgun Gothic",sans-serif;background:var(--bg);color:#173a34;overflow:hidden}header{height:66px;background:#fff;border-bottom:9px solid var(--deep);display:flex;align-items:center;padding:0 14px;gap:8px}h1{margin:0 16px 0 0;font-size:24px;white-space:nowrap}button,a{border:1px solid var(--line);border-radius:4px;background:#eef7f4;color:#073f37;padding:7px 10px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:var(--deep);color:#fff}.status{margin-left:auto}.toolbar{height:48px;display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff}.toolbar input{width:260px}.toolbar select{width:100px}input,select{border:1px solid #a0bdb7;border-radius:3px;padding:5px;background:#fff}.legend{margin-left:auto;display:flex;gap:9px}.legend i{width:12px;height:12px;display:inline-block;border:1px solid #aac0bb;vertical-align:-2px;margin-right:3px}.manualKey,.cell.dirty{background:#fff3c4!important}.autoKey{background:#d9ecff}.sheet{height:calc(100vh - 114px);overflow:auto;background:#fff;border-top:1px solid var(--line)}table{border-collapse:separate;border-spacing:0;min-width:2700px;width:max-content}th{position:sticky;top:0;z-index:4;background:var(--deep);color:#fff;height:29px;padding:4px 6px;border-right:1px solid #a9cfc7;white-space:nowrap}td{height:27px;padding:0;border-right:1px dotted #91a9a4;border-bottom:1px dotted #91a9a4}tr:nth-child(even) td{background:#f5f8f7}tr.selected td{background:#d7ece7!important}.selectCol{position:sticky;left:0;z-index:5;width:42px;min-width:42px;text-align:center;background:#e3f0ed!important}.pick{width:16px;height:16px;accent-color:var(--deep)}.cell{width:112px;height:26px;border:0;border-radius:0;padding:3px 5px;background:transparent;font:11px "Malgun Gothic",sans-serif}.cell.wide{width:170px}.cell.date{width:105px}.cell.num{width:90px}.cell.center{text-align:center}.cell.delta{color:#075fba;text-decoration:underline;font-weight:800;cursor:pointer}.rowno{color:#7b8d89;font-size:9px;margin-right:4px}.modalBack{display:none;position:fixed;inset:0;background:#00231e73;z-index:20;align-items:center;justify-content:center}.modalBack.open{display:flex}.modal{width:min(620px,94vw);max-height:82vh;overflow:auto;background:#fff;border:2px solid var(--deep);border-radius:10px;padding:14px}.modalHead{display:flex;align-items:center;gap:8px}.modalHead h2{margin:0;flex:1}.rule{background:#eef7f4;padding:9px;border-radius:5px;line-height:1.55;margin:10px 0}.matchList label{display:grid;grid-template-columns:35px 1.3fr 1fr 65px 65px;gap:8px;padding:9px;border-bottom:1px solid #d8e5e2;align-items:center}.modalFoot{display:flex;justify-content:flex-end;margin-top:10px}.deltaTable{width:100%;min-width:0;border-collapse:collapse}.deltaTable th{position:static}.deltaTable td{padding:6px;text-align:center}.excluded{color:#a33;text-decoration:line-through}.deltaResult{font-size:15px;font-weight:900;text-align:right;margin-top:10px}
</style></head><body>
<header><h1>메자닌 종목정보 관리</h1><a href="../mezzanine/">대시보드</a><button class="primary" id="save">변경사항 저장</button><button id="findSame">동일종목 찾기</button><button id="dartSelected">선택 종목 OpenDART</button><a href="../mezzanine-disclosures/">공시정보조회</a><span class="status" id="status">불러오는 중…</span></header>
<div class="toolbar"><input id="search" placeholder="종목명·발행사·코드 검색"><select id="type"><option value="">전체 유형</option><option>CB</option><option>BW</option><option>EB</option></select><button id="clearFilter">필터 초기화</button><span id="count"></span><div class="legend"><span><i class="autoKey"></i>원본값</span><span><i class="manualKey"></i>수정값</span></div></div>
<main class="sheet"><table><thead><tr id="headers"></tr></thead><tbody id="rows"></tbody></table></main>
<div class="modalBack" id="dartModal"><section class="modal" style="width:min(940px,94vw)"><div class="modalHead"><h2>OpenDART 발행결정 선택</h2><button id="closeDart">닫기</button></div><div class="rule"><b>조회기간</b> <input type="date" id="dartBegin"> ~ <input type="date" id="dartEnd"> <button class="primary" id="searchDart">후보 조회</button></div><div id="dartSummary"></div><div class="matchList" id="dartList"></div><div class="modalFoot"><button class="primary" id="applyDart">선택 후보 적용</button></div></section></div>
<div class="modalBack" id="deltaModal"><section class="modal"><div class="modalHead"><h2 id="deltaTitle">델타 계산 상세</h2><button id="closeDelta">닫기</button></div><div class="rule">현재 추정델타는 최근 10일간의 일별 델타 중 <b>음수이거나 100%를 초과한 값은 제외</b>하고 산술평균한 값입니다.</div><div id="deltaDetail"></div></section></div>
<div class="modalBack" id="matchModal"><section class="modal"><div class="modalHead"><h2>동일종목 후보</h2><button id="closeMatch">닫기</button></div><div class="rule" id="matchGuide"></div><div class="matchList" id="matchList"></div><div class="modalFoot"><button class="primary" id="applyMatch">선택 종목 정보 가져오기</button></div></section></div>
<script type="module">
const SUPABASE_URL='https://esqakvzvchcunhzjlyry.supabase.co';
const SUPABASE_KEY='sb_publishable_T0q_8mB9yzcitTL7HH0SuA_W4DUcVtP';
const EDITABLE=['메자닌종목명','KR코드','발행사명','교환대상명','회차','구분','발행코드','교환코드','델타','Coupon','YTM','발행금액','최초전환가','전환가','전환시작일','전환종료일','리픽싱','Floor','최초PUT','PUT주기','PUT','CALL','CALL범위'];
const $=s=>document.querySelector(s),percentFields=new Set(['Coupon','YTM','리픽싱','CALL범위']),numberFields=new Set(['발행금액','최초전환가','전환가','Floor']);
let client,user,rows=[],selectedId='',dirty=new Set(),dartCandidates=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function displayValue(c,v){if(v==null||v==='')return'';if(c==='CALL')return String(v).slice(0,10);let n=Number(String(v).replace(/,/g,''));if(c==='델타'||c==='Coupon'||c==='YTM')return Number.isFinite(n)?`${(n*100).toFixed(1)}%`:v;if(c==='리픽싱')return Number.isFinite(n)?`${Math.round(n*100)}%`:v;if(c==='CALL범위')return Number.isFinite(n)?`${(n*100).toLocaleString('ko-KR')}%`:v;if(numberFields.has(c))return Number.isFinite(n)?n.toLocaleString('ko-KR'):v;return v}
function cellClass(c){let a=[];if(['메자닌종목명','발행사명','교환대상명'].includes(c))a.push('wide');if(c.includes('일')||c==='PUT'||c==='CALL')a.push('date');if(['회차','델타','Coupon','YTM','발행금액','최초전환가','전환가','리픽싱','Floor','PUT주기','CALL범위'].includes(c))a.push('num');if(EDITABLE.indexOf(c)>=EDITABLE.indexOf('회차'))a.push('center');if(c==='델타')a.push('delta');return a.join(' ')}
function filtered(){let q=$('#search').value.toLowerCase(),t=$('#type').value;return rows.filter(r=>(!t||r.payload['구분']===t)&&(!q||[r.payload['메자닌종목명'],r.payload['발행사명'],r.payload['KR코드'],r.payload['교환대상명']].join(' ').toLowerCase().includes(q)))}
function render(){let list=filtered();$('#headers').innerHTML='<th class="selectCol">선택</th>'+EDITABLE.map(c=>`<th>${c}</th>`).join('');$('#rows').innerHTML=list.map((r,i)=>`<tr data-no="${r.row_no}" class="${selectedId===r.row_no?'selected':''}"><td class="selectCol"><input class="pick" type="radio" name="pick" ${selectedId===r.row_no?'checked':''}></td>${EDITABLE.map((c,j)=>`<td>${j===0?`<span class="rowno">${i+2}</span>`:''}<input class="cell ${cellClass(c)} ${dirty.has(r.row_no)?'dirty':''}" data-field="${c}" value="${esc(displayValue(c,r.payload[c]))}" ${c==='델타'?'readonly':''}></td>`).join('')}</tr>`).join('');$('#count').textContent=`${list.length} / ${rows.length}개`;$('#status').textContent=dirty.size?`${dirty.size}개 행 저장 대기`:user?`${rows.length}개 종목`:'로그인이 필요합니다.'}
async function load(){const {createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');client=window.parent!==window&&window.parent.dashboardSupabase||createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true}});user=(await client.auth.getSession()).data.session?.user;if(!user)throw Error('메인 화면에서 로그인한 뒤 다시 열어주세요.');let out=[];for(let start=0;;start+=1000){let {data,error}=await client.from('manual_file_rows').select('row_no,payload').eq('domain','mezzanine').eq('file_key','instrument_info').eq('sheet_name','Sheet1').order('row_no').range(start,start+999);if(error)throw error;out.push(...data);if(data.length<1000)break}rows=out.map(r=>({...r,payload:Object.fromEntries(EDITABLE.map(c=>[c,r.payload[c]??'']).concat(Object.entries(r.payload).filter(([k])=>!EDITABLE.includes(k))))}));let p=new URLSearchParams(location.search),name=p.get('newName');if(name){let payload=Object.fromEntries(EDITABLE.map(c=>[c,'']));Object.assign(payload,{메자닌종목명:name,KR코드:p.get('newCode')||'',구분:p.get('newType')||'',발행사명:p.get('newIssuer')||'',발행코드:p.get('newIssuerCode')||''});let no=Math.max(0,...rows.map(r=>r.row_no))+1;rows.unshift({row_no:no,payload});selectedId=no;dirty.add(no)}render()}
$('#rows').onchange=e=>{if(e.target.classList.contains('pick')){selectedId=Number(e.target.closest('tr').dataset.no);render()}};
$('#rows').onfocusin=e=>{let c=e.target.dataset.field;if(!c||c==='델타')return;let r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no)),v=r.payload[c];e.target.value=percentFields.has(c)&&v!==''?Number(v)*100:String(v??'').replace(/,/g,'')};
$('#rows').oninput=e=>{let c=e.target.dataset.field;if(!c||c==='델타')return;let r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no)),raw=e.target.value.replace(/[,%]/g,'');r.payload[c]=percentFields.has(c)&&raw!==''?Number(raw)/100:raw;dirty.add(r.row_no);$('#status').textContent=`${dirty.size}개 행 저장 대기`};
$('#rows').onfocusout=e=>{let c=e.target.dataset.field,r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no));if(c&&r)e.target.value=displayValue(c,r.payload[c])};
$('#rows').onclick=e=>{if(e.target.dataset.field!=='델타')return;let r=rows.find(x=>x.row_no===Number(e.target.closest('tr').dataset.no)),history=Object.entries(r.payload).map(([k,v])=>({date:k,value:Number(v)})).filter(x=>/^\d{4}-\d{2}-\d{2}/.test(x.date)&&Number.isFinite(x.value)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10),valid=history.filter(x=>x.value>=0&&x.value<=1);$('#deltaTitle').textContent=`${r.payload['메자닌종목명']} · 델타 계산 상세`;$('#deltaDetail').innerHTML=`<table class="deltaTable"><thead><tr><th>일자</th><th>일별 델타</th><th>평균 반영</th></tr></thead><tbody>${history.map(x=>`<tr class="${x.value>=0&&x.value<=1?'':'excluded'}"><td>${x.date.slice(0,10)}</td><td>${displayValue('델타',x.value)}</td><td>${x.value>=0&&x.value<=1?'포함':'제외'}</td></tr>`).join('')||'<tr><td colspan="3">최근 관측값이 없습니다.</td></tr>'}</tbody></table><div class="deltaResult">유효 ${valid.length}건 평균 · 현재 추정델타 ${displayValue('델타',r.payload['델타'])}</div>`;$('#deltaModal').classList.add('open')};
function key(v){return String(v||'').toLowerCase().replace(/제?\d+회|\d+(cb|bw|eb)|cb|bw|eb|전환|콜|call|행사/g,'').replace(/[^0-9a-z가-힣]/g,'')}function score(a,b){a=key(a);b=key(b);if(!a||!b)return 0;if(a===b)return 1;let A=new Set([...Array(Math.max(0,a.length-1))].map((_,i)=>a.slice(i,i+2))),B=new Set([...Array(Math.max(0,b.length-1))].map((_,i)=>b.slice(i,i+2)));return A.size&&B.size?2*[...A].filter(x=>B.has(x)).length/(A.size+B.size):0}
$('#findSame').onclick=()=>{let t=rows.find(x=>x.row_no===selectedId);if(!t)return $('#status').textContent='먼저 종목을 선택하세요.';let candidates=rows.filter(x=>x!==t).map(x=>({x,s:score(t.payload['메자닌종목명'],x.payload['메자닌종목명'])+(t.payload['발행사명']===x.payload['발행사명']?0.25:0)})).filter(x=>x.s>.18).sort((a,b)=>b.s-a.s).slice(0,10);$('#matchGuide').textContent=`${t.payload['메자닌종목명']}과 이름이 비슷한 기존 등록 종목입니다.`;$('#matchList').innerHTML=candidates.map((v,i)=>`<label><input type="radio" name="same" value="${v.x.row_no}" ${i?'':'checked'}><b>${esc(v.x.payload['메자닌종목명'])}</b><span>${esc(v.x.payload['발행사명'])}</span><span>${esc(v.x.payload['구분'])}</span><span>${esc(v.x.payload['회차'])}회</span></label>`).join('')||'<div class="rule">비슷한 종목을 찾지 못했습니다.</div>';$('#matchModal').classList.add('open')};
$('#applyMatch').onclick=()=>{let p=document.querySelector('input[name=same]:checked'),t=rows.find(x=>x.row_no===selectedId);if(!p||!t)return;let s=rows.find(x=>x.row_no===Number(p.value)),keep={메자닌종목명:t.payload['메자닌종목명'],KR코드:t.payload['KR코드']};for(let c of EDITABLE)if(c!=='델타')t.payload[c]=s.payload[c]??'';Object.assign(t.payload,keep);dirty.add(t.row_no);$('#matchModal').classList.remove('open');render()};
const dartMap={메자닌종목명:'issue_name',발행사명:'corp_name',교환대상명:'target_stock',회차:'round',구분:'bond_type_code',발행코드:'stock_code',교환코드:'exchange_code',Coupon:'coupon',YTM:'ytm',발행금액:'issue_amount_million',최초전환가:'convert_price',전환가:'convert_price',전환시작일:'convert_start',전환종료일:'convert_end',리픽싱:'refixing',Floor:'floor_price'};
$('#dartSelected').onclick=()=>{let r=rows.find(x=>x.row_no===selectedId);if(!r)return $('#status').textContent='먼저 종목을 선택하세요.';let end=new Date(),begin=new Date();begin.setFullYear(end.getFullYear()-10);$('#dartBegin').value=begin.toISOString().slice(0,10);$('#dartEnd').value=end.toISOString().slice(0,10);$('#dartSummary').textContent=r.payload['메자닌종목명'];$('#dartList').innerHTML='';$('#dartModal').classList.add('open')};
$('#searchDart').onclick=async()=>{let r=rows.find(x=>x.row_no===selectedId),button=$('#searchDart');if(!r)return;button.disabled=true;$('#dartSummary').textContent='OpenDART 조회 중…';try{let {data,error}=await client.functions.invoke('opendart-candidates',{body:{identifier:r.payload['발행코드']||r.payload['발행사명'],begin:$('#dartBegin').value.replaceAll('-',''),end:$('#dartEnd').value.replaceAll('-','')}});if(error||!data?.ok)throw Error(data?.message||error?.message||'조회 실패');dartCandidates=data.list||[];$('#dartSummary').textContent=`${data.company.corp_name} · 후보 ${dartCandidates.length}건`;$('#dartList').innerHTML=dartCandidates.map((x,i)=>`<label style="grid-template-columns:35px 1.3fr 55px 55px 90px 110px 100px 60px"><input type="radio" name="dartCandidate" value="${i}" ${i?'':'checked'}><b>${esc(x.issue_name)}</b><span>${esc(x.bond_type_code)}</span><span>${esc(x.round)}회</span><span>${esc(x.issue_date)}</span><span>${Number(x.issue_amount_million||0).toLocaleString()}</span><span>${Number(x.convert_price||0).toLocaleString()}</span><a target="_blank" rel="noopener" href="https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${esc(x.rcept_no)}">원문</a></label>`).join('')||'<div class="rule">해당 기간의 발행결정 후보가 없습니다.</div>'}catch(e){$('#dartSummary').textContent=e.message}finally{button.disabled=false}};
$('#applyDart').onclick=()=>{let p=document.querySelector('input[name=dartCandidate]:checked'),r=rows.find(x=>x.row_no===selectedId);if(!p||!r)return;let candidate=dartCandidates[Number(p.value)];for(let [field,key] of Object.entries(dartMap))if(candidate[key]!==null&&candidate[key]!==undefined&&candidate[key]!=='')r.payload[field]=candidate[key];dirty.add(r.row_no);$('#dartModal').classList.remove('open');render();$('#status').textContent='OpenDART 후보를 적용했습니다. 변경사항 저장을 눌러주세요.'};
$('#save').onclick=async()=>{let changed=rows.filter(r=>dirty.has(r.row_no)).map(r=>({domain:'mezzanine',file_key:'instrument_info',file_label:'종목정보.xlsx',sheet_name:'Sheet1',row_no:r.row_no,payload:r.payload,created_by:user.id,updated_at:new Date().toISOString()}));let {error}=await client.from('manual_file_rows').upsert(changed,{onConflict:'domain,file_key,sheet_name,row_no'});if(error)throw error;dirty.clear();history.replaceState({},'',location.pathname);render();$('#status').textContent='Supabase 저장 완료'};
$('#search').oninput=render;$('#type').onchange=render;$('#clearFilter').onclick=()=>{$('#search').value=$('#type').value='';render()};$('#closeMatch').onclick=()=>$('#matchModal').classList.remove('open');$('#closeDelta').onclick=()=>$('#deltaModal').classList.remove('open');$('#closeDart').onclick=()=>$('#dartModal').classList.remove('open');load().catch(e=>$('#status').textContent=e.message);
</script></body></html>
