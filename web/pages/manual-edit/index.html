<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>정보수정</title>
  <style>
    :root {
      --ink: #172026;
      --muted: #65717d;
      --line: #d9e1e8;
      --panel: #fff;
      --wash: #f4f6f8;
      --accent: #0f766e;
      --accent-soft: #e6f5f2;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif; color: var(--ink); background: var(--wash); }
    header { padding: 17px 22px 13px; background: #fff; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 5px; font-size: 21px; letter-spacing: 0; }
    .subtitle, .status { color: var(--muted); font-size: 12px; }
    main { padding: 14px 22px 24px; display: grid; gap: 12px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .toolbar, .authbar, .pager { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px 12px; }
    .toolbar { justify-content: space-between; border-bottom: 1px solid var(--line); }
    .authbar { border-bottom: 1px solid var(--line); background: #fbfcfd; }
    .pager { justify-content: flex-end; border-top: 1px solid var(--line); }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    button, input { height: 32px; border: 1px solid #c8d1dc; border-radius: 6px; background: #fff; color: var(--ink); font: inherit; font-size: 13px; }
    button { padding: 0 10px; font-weight: 700; cursor: pointer; }
    button:hover { border-color: #82909f; }
    button.active, button.primary { color: #fff; border-color: var(--accent); background: var(--accent); }
    button.danger { color: var(--danger); border-color: #f0b6b0; }
    button:disabled { cursor: default; opacity: .45; }
    input { padding: 0 9px; min-width: 190px; }
    .sheet-tabs { padding: 8px 12px; border-bottom: 1px solid var(--line); background: #fafbfc; }
    .sheet-tabs button { height: 28px; }
    .badge { display: inline-flex; align-items: center; height: 25px; padding: 0 8px; border-radius: 5px; background: var(--accent-soft); color: #0b615a; font-size: 12px; font-weight: 800; }
    .table-wrap { min-height: 420px; max-height: calc(100vh - 310px); overflow: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; font-size: 12px; }
    th, td { min-width: 112px; padding: 7px 8px; white-space: nowrap; border-right: 1px solid #edf1f4; border-bottom: 1px solid #edf1f4; }
    th { position: sticky; top: 0; z-index: 2; text-align: left; color: #334155; background: #edf3f5; font-weight: 800; }
    td[contenteditable="true"] { outline: none; }
    td[contenteditable="true"]:focus { background: #f3fffc; box-shadow: inset 0 0 0 2px var(--accent); }
    tr.dirty td { background: #fff9e8; }
    .row-no { min-width: 58px; width: 58px; text-align: right; color: var(--muted); background: #f8fafb; font-weight: 700; }
    .select-col { min-width: 44px; width: 44px; text-align: center; background: #f8fafb; }
    .select-col input { min-width: 0; width: 16px; height: 16px; padding: 0; }
    .status { padding: 9px 12px; border-top: 1px solid var(--line); background: #fbfcfd; }
    .spacer { flex: 1; }
    @media (max-width: 860px) {
      main { padding: 10px; }
      .toolbar, .authbar { align-items: stretch; }
      input { min-width: 150px; flex: 1; }
      .table-wrap { max-height: calc(100vh - 360px); }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">정보수정</h1>
    <div class="subtitle">기존 엑셀 데이터를 조회하고, 로그인 후 Supabase 원본을 수정합니다.</div>
  </header>

  <main>
    <section class="panel">
      <div class="authbar">
        <span class="badge" id="sourceBadge">로컬 원본</span>
        <button id="loadDbButton" type="button" disabled>DB 다시 불러오기</button>
        <span class="spacer"></span>
        <span class="subtitle" id="authStatus">로그인 세션을 확인하고 있습니다.</span>
      </div>
      <div class="toolbar">
        <div class="tabs" id="fileTabs"></div>
        <div class="tabs">
          <button id="downloadExcelButton" type="button">엑셀 다운로드</button>
          <button id="uploadExcelButton" type="button">엑셀 업로드</button>
          <input id="excelFileInput" type="file" accept=".xlsx" hidden>
          <button id="addRowButton" type="button">행 추가</button>
          <button id="deleteSelectedFundsButton" type="button" class="danger" hidden>선택 펀드 삭제</button>
          <button id="deleteRowButton" type="button" class="danger">마지막 행 삭제</button>
          <button id="saveButton" type="button" class="primary" disabled>변경 저장</button>
        </div>
      </div>
      <div class="sheet-tabs tabs" id="sheetTabs"></div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pager">
        <span class="subtitle" id="pageInfo"></span>
        <button id="prevButton" type="button">이전</button>
        <button id="nextButton" type="button">다음</button>
      </div>
      <div class="status" id="status">데이터를 불러오는 중입니다.</div>
    </section>
  </main>

  <script type="module">
    const SUPABASE_URL = "https://esqakvzvchcunhzjlyry.supabase.co";
    const SUPABASE_KEY = "sb_publishable_T0q_8mB9yzcitTL7HH0SuA_W4DUcVtP";
    const PAGE_SIZE = 100;
    const domainNames = { stock: "주식 대시보드", bond: "채권대시보드", mezzanine: "메자닌대시보드", fund: "펀드차트", global: "글로벌대시보드" };
    const params = new URLSearchParams(location.search);
    const domain = ["stock", "bond", "mezzanine", "fund", "global"].includes(params.get("domain")) ? params.get("domain") : "stock";
    const requestedFileKey = params.get("file") || "";

    let indexData = [];
    let files = [];
    let activeFile = null;
    let activeSheet = null;
    let rows = [];
    let columns = [];
    let page = 1;
    let source = "local";
    let supabase = null;
    let currentUser = null;
    let mustChangePassword = false;
    const dirtyRows = new Set();
    const deletedRows = new Set();
    const selectedRows = new Set();
    let realtimeChannel = null;
    let realtimeRefreshTimer = null;

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;").replaceAll("'", "&#039;");

    function canSelectFundRows() {
      return domain === "stock" && activeFile?.file_key === "fund_info";
    }

    async function getSupabase() {
      if (supabase) return supabase;
      if (window.parent !== window && window.parent.dashboardSupabase) {
        supabase = window.parent.dashboardSupabase;
        return supabase;
      }
      const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
      supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
      });
      return supabase;
    }

    function dataPath(file) {
      return `../../data/manual/${file.domain}_${file.file_key}.json`;
    }

    async function loadLocal(file, sheetName) {
      const response = await fetch(dataPath(file));
      if (!response.ok) throw new Error(`로컬 데이터 파일을 열 수 없습니다 (${response.status})`);
      const payload = await response.json();
      const sheet = payload.sheets.find((item) => item.name === sheetName) || payload.sheets[0];
      columns = sheet.columns;
      rows = sheet.rows.map((payload, index) => ({ row_no: index + 1, payload }));
      source = "local";
    }

    async function loadDatabase(file, sheetName) {
      if (!currentUser) throw new Error("Supabase 로그인이 필요합니다.");
      if (mustChangePassword) throw new Error("초기 비밀번호를 먼저 변경해야 합니다.");
      const client = await getSupabase();
      const loaded = [];
      for (let start = 0; ; start += 1000) {
        const { data, error } = await client.from("manual_file_rows")
          .select("row_no,payload")
          .eq("domain", domain)
          .eq("file_key", file.file_key)
          .eq("sheet_name", sheetName)
          .order("row_no")
          .range(start, start + 999);
        if (error) throw error;
        loaded.push(...data);
        if (data.length < 1000) break;
      }
      const sheetMeta = file.sheets.find((item) => item.name === sheetName) || file.sheets[0];
      columns = sheetMeta.columns;
      rows = loaded;
      source = "database";
    }

    async function loadAllDatabaseSheets(file) {
      const result = {};
      for (const sheet of file.sheets) {
        await loadDatabase(file, sheet.name);
        result[sheet.name] = rows.map((row) => ({ ...row.payload }));
      }
      return result;
    }

    function workbookError(code, message) {
      const error = new Error(`${code}: ${message}`);
      error.code = code;
      return error;
    }

    function assertWorkbookStructure(workbook, file) {
      const expectedSheets = file.sheets.map((sheet) => sheet.name);
      const actualSheets = workbook.SheetNames;
      if (JSON.stringify(actualSheets) !== JSON.stringify(expectedSheets)) {
        throw workbookError("XLSX_STRUCTURE_SHEETS", `시트 구조가 다릅니다. 기대값: ${expectedSheets.join(", ")}`);
      }
      const parsed = {};
      for (const sheetMeta of file.sheets) {
        const worksheet = workbook.Sheets[sheetMeta.name];
        if (Object.values(worksheet).some((cell) => cell && typeof cell === "object" && cell.f)) {
          throw workbookError("XLSX_STRUCTURE_FORMULA", `${sheetMeta.name} 시트에는 수식을 사용할 수 없습니다.`);
        }
        const matrix = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null, raw: true });
        const headers = (matrix[0] || []).map((value) => String(value ?? "").trim());
        if (new Set(headers).size !== headers.length) {
          throw workbookError("XLSX_STRUCTURE_DUPLICATE_COLUMNS", `${sheetMeta.name} 시트에 중복 컬럼이 있습니다.`);
        }
        if (JSON.stringify(headers) !== JSON.stringify(sheetMeta.columns)) {
          throw workbookError("XLSX_STRUCTURE_COLUMNS", `${sheetMeta.name} 시트의 컬럼 추가·삭제·이름·순서 변경은 허용되지 않습니다.`);
        }
        parsed[sheetMeta.name] = matrix.slice(1)
          .filter((values) => values.some((value) => value !== null && value !== ""))
          .map((values) => Object.fromEntries(sheetMeta.columns.map((column, index) => {
            const value = values[index];
            return [column, value instanceof Date ? value.toISOString().slice(0, 10) : value ?? ""];
          })));
      }
      return parsed;
    }

    async function ensureXlsx() {
      if (!window.XLSX) window.XLSX = await import("https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs");
      return window.XLSX;
    }

    async function downloadExcel() {
      if (!currentUser) throw new Error("Supabase 로그인이 필요합니다.");
      $("status").textContent = "현재 DB 데이터를 엑셀로 생성하고 있습니다.";
      const XLSX = await ensureXlsx();
      const originalFile = activeFile;
      const originalSheet = activeSheet;
      const allSheets = await loadAllDatabaseSheets(activeFile);
      const workbook = XLSX.utils.book_new();
      for (const sheetMeta of originalFile.sheets) {
        const worksheet = XLSX.utils.json_to_sheet(allSheets[sheetMeta.name], { header: sheetMeta.columns });
        XLSX.utils.book_append_sheet(workbook, worksheet, sheetMeta.name);
      }
      XLSX.writeFile(workbook, originalFile.file_label.endsWith(".xlsx") ? originalFile.file_label : `${originalFile.file_label}.xlsx`);
      await switchData(originalFile, originalSheet.name);
      $("status").textContent = "현재 DB 데이터를 엑셀로 내려받았습니다.";
    }

    async function uploadExcel(fileBlob) {
      if (!currentUser || mustChangePassword) throw new Error("편집 권한이 필요합니다.");
      const XLSX = await ensureXlsx();
      const workbook = XLSX.read(await fileBlob.arrayBuffer(), { type: "array", cellDates: true });
      const imported = assertWorkbookStructure(workbook, activeFile);
      const client = await getSupabase();
      $("status").textContent = "검증된 엑셀 데이터를 Supabase에 반영하고 있습니다.";
      for (const sheetMeta of activeFile.sheets) {
        const payloads = imported[sheetMeta.name];
        const records = payloads.map((payload, index) => ({
          domain,
          file_key: activeFile.file_key,
          file_label: activeFile.file_label,
          sheet_name: sheetMeta.name,
          row_no: index + 1,
          payload,
          created_by: currentUser.id,
          updated_at: new Date().toISOString()
        }));
        for (let start = 0; start < records.length; start += 500) {
          const { error } = await client.from("manual_file_rows")
            .upsert(records.slice(start, start + 500), { onConflict: "domain,file_key,sheet_name,row_no" });
          if (error) throw error;
        }
        const { error: deleteError } = await client.from("manual_file_rows").delete()
          .eq("domain", domain).eq("file_key", activeFile.file_key)
          .eq("sheet_name", sheetMeta.name).gt("row_no", records.length);
        if (deleteError) throw deleteError;
      }
      await switchData(activeFile, activeFile.sheets[0].name);
      $("status").textContent = "엑셀 업로드와 Supabase 반영을 완료했습니다.";
    }

    async function subscribeRealtime() {
      if (!currentUser || realtimeChannel) return;
      const client = await getSupabase();
      realtimeChannel = client.channel(`manual-${domain}-${crypto.randomUUID()}`)
        .on("postgres_changes", {
          event: "*", schema: "public", table: "manual_file_rows", filter: `domain=eq.${domain}`
        }, (payload) => {
          const changed = payload.new?.file_key || payload.old?.file_key;
          if (changed !== activeFile?.file_key) return;
          clearTimeout(realtimeRefreshTimer);
          realtimeRefreshTimer = setTimeout(() => {
            if (dirtyRows.size || deletedRows.size) {
              $("status").textContent = "다른 사용자의 변경이 감지됐습니다. 현재 편집을 저장하거나 DB를 다시 불러오세요.";
              return;
            }
            switchData().catch((error) => { $("status").textContent = `실시간 갱신 실패: ${error.message}`; });
          }, 350);
        }).subscribe();
    }

    async function switchData(file = activeFile, sheetName = activeSheet?.name) {
      activeFile = file;
      activeSheet = file.sheets.find((item) => item.name === sheetName) || file.sheets[0];
      page = 1;
      dirtyRows.clear();
      deletedRows.clear();
      selectedRows.clear();
      $("status").textContent = `${file.file_label} 데이터를 불러오는 중입니다.`;
      try {
        if (currentUser) await loadDatabase(file, activeSheet.name);
        else await loadLocal(file, activeSheet.name);
      } catch (error) {
        try {
          await loadLocal(file, activeSheet.name);
          $("status").textContent = `DB 조회 실패로 로컬 원본을 표시합니다: ${error.message}`;
        } catch (localError) {
          rows = [];
          columns = activeSheet.columns;
          source = "local";
          $("status").textContent = currentUser
            ? `데이터 조회 실패: ${error.message}`
            : "메인 화면에서 로그인하면 Supabase DB 데이터를 불러옵니다.";
        }
      }
      render();
    }

    function renderTabs() {
      $("fileTabs").innerHTML = files.map((file) =>
        `<button type="button" data-file="${escapeHtml(file.file_key)}" class="${file.file_key === activeFile.file_key ? "active" : ""}">${escapeHtml(file.file_label)}</button>`
      ).join("");
      document.querySelectorAll("[data-file]").forEach((button) => button.addEventListener("click", () => {
        const file = files.find((item) => item.file_key === button.dataset.file);
        switchData(file, file.sheets[0].name);
      }));

      $("sheetTabs").innerHTML = activeFile.sheets.map((sheet) =>
        `<button type="button" data-sheet="${escapeHtml(sheet.name)}" class="${sheet.name === activeSheet.name ? "active" : ""}">${escapeHtml(sheet.name)} · ${sheet.row_count.toLocaleString()}행</button>`
      ).join("");
      document.querySelectorAll("[data-sheet]").forEach((button) => button.addEventListener("click", () => {
        switchData(activeFile, button.dataset.sheet);
      }));
    }

    function renderTable() {
      const start = (page - 1) * PAGE_SIZE;
      const visible = rows.slice(start, start + PAGE_SIZE);
      const selectable = canSelectFundRows();
      const selectHead = selectable ? `<th class="select-col"><input id="selectVisibleRows" type="checkbox" aria-label="현재 페이지 펀드 전체 선택"></th>` : "";
      $("tableHead").innerHTML = `<tr>${selectHead}<th class="row-no">#</th>${columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("")}</tr>`;
      $("tableBody").innerHTML = visible.map((row) =>
        `<tr data-row-no="${row.row_no}" class="${dirtyRows.has(row.row_no) ? "dirty" : ""}">${selectable ? `<td class="select-col"><input class="row-selector" type="checkbox" aria-label="펀드 선택" ${selectedRows.has(row.row_no) ? "checked" : ""}></td>` : ""}<td class="row-no">${row.row_no.toLocaleString()}</td>${columns.map((column) => `<td contenteditable="${currentUser ? "true" : "false"}" data-column="${escapeHtml(column)}">${escapeHtml(row.payload[column])}</td>`).join("")}</tr>`
      ).join("");
      const selectVisibleRows = $("selectVisibleRows");
      if (selectVisibleRows) {
        selectVisibleRows.checked = visible.length > 0 && visible.every((row) => selectedRows.has(row.row_no));
        selectVisibleRows.addEventListener("change", () => {
          visible.forEach((row) => {
            if (selectVisibleRows.checked) selectedRows.add(row.row_no);
            else selectedRows.delete(row.row_no);
          });
          renderTable();
          updateControls();
        });
      }
      $("tableBody").querySelectorAll(".row-selector").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const rowNo = Number(checkbox.closest("tr").dataset.rowNo);
          if (checkbox.checked) selectedRows.add(rowNo);
          else selectedRows.delete(rowNo);
          updateControls();
        });
      });
      $("tableBody").querySelectorAll("td[contenteditable='true']").forEach((cell) => {
        cell.addEventListener("input", () => {
          const rowNo = Number(cell.parentElement.dataset.rowNo);
          const row = rows.find((item) => item.row_no === rowNo);
          row.payload[cell.dataset.column] = cell.textContent.trim();
          dirtyRows.add(rowNo);
          cell.parentElement.classList.add("dirty");
          updateControls();
        });
      });
    }

    function updateControls() {
      const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
      $("pageInfo").textContent = `${rows.length.toLocaleString()}행 · ${page.toLocaleString()} / ${totalPages.toLocaleString()} 페이지`;
      $("prevButton").disabled = page <= 1;
      $("nextButton").disabled = page >= totalPages;
      $("saveButton").disabled = !currentUser || mustChangePassword || (dirtyRows.size === 0 && deletedRows.size === 0);
      $("addRowButton").disabled = !currentUser || mustChangePassword;
      $("deleteRowButton").hidden = canSelectFundRows();
      $("deleteRowButton").disabled = !currentUser || mustChangePassword || rows.length === 0;
      $("deleteSelectedFundsButton").hidden = !canSelectFundRows();
      $("deleteSelectedFundsButton").disabled = !currentUser || mustChangePassword || selectedRows.size === 0;
      $("downloadExcelButton").disabled = !currentUser || mustChangePassword;
      $("uploadExcelButton").disabled = !currentUser || mustChangePassword;
      $("sourceBadge").textContent = source === "database" ? "Supabase DB" : "로컬 원본";
    }

    function render() {
      renderTabs();
      renderTable();
      updateControls();
      if (currentUser && !$("status").textContent.includes("실패")) {
        $("status").textContent = `${activeFile.file_label} / ${activeSheet.name} · ${rows.length.toLocaleString()}행을 표시 중입니다.`;
      }
    }

    async function saveChanges() {
      if (!currentUser || mustChangePassword) return;
      const client = await getSupabase();
      $("status").textContent = "변경 내용을 Supabase에 저장하는 중입니다.";
      const changed = rows.filter((row) => dirtyRows.has(row.row_no)).map((row) => ({
        domain,
        file_key: activeFile.file_key,
        file_label: activeFile.file_label,
        sheet_name: activeSheet.name,
        row_no: row.row_no,
        payload: row.payload,
        created_by: currentUser.id,
        updated_at: new Date().toISOString()
      }));
      for (let start = 0; start < changed.length; start += 500) {
        const { error } = await client.from("manual_file_rows")
          .upsert(changed.slice(start, start + 500), { onConflict: "domain,file_key,sheet_name,row_no" });
        if (error) throw error;
      }
      for (const rowNo of deletedRows) {
        const { error } = await client.from("manual_file_rows").delete()
          .eq("domain", domain).eq("file_key", activeFile.file_key)
          .eq("sheet_name", activeSheet.name).eq("row_no", rowNo);
        if (error) throw error;
      }
      dirtyRows.clear();
      deletedRows.clear();
      source = "database";
      render();
      $("status").textContent = "Supabase 저장을 완료했습니다.";
    }

    $("loadDbButton").addEventListener("click", () => switchData());
    $("downloadExcelButton").addEventListener("click", () => downloadExcel().catch((error) => {
      $("status").textContent = `엑셀 다운로드 실패: ${error.message}`;
    }));
    $("uploadExcelButton").addEventListener("click", () => $("excelFileInput").click());
    $("excelFileInput").addEventListener("change", () => {
      const file = $("excelFileInput").files[0];
      if (file) uploadExcel(file).catch((error) => { $("status").textContent = `엑셀 업로드 실패: ${error.message}`; });
      $("excelFileInput").value = "";
    });
    $("saveButton").addEventListener("click", () => saveChanges().catch((error) => {
      $("status").textContent = `Supabase 저장 실패: ${error.message}`;
    }));
    $("addRowButton").addEventListener("click", () => {
      const rowNo = rows.length ? Math.max(...rows.map((row) => row.row_no)) + 1 : 1;
      rows.push({ row_no: rowNo, payload: Object.fromEntries(columns.map((column) => [column, ""])) });
      dirtyRows.add(rowNo);
      page = Math.ceil(rows.length / PAGE_SIZE);
      renderTable();
      updateControls();
    });
    $("deleteRowButton").addEventListener("click", () => {
      const removed = rows.pop();
      if (removed) {
        deletedRows.add(removed.row_no);
        dirtyRows.delete(removed.row_no);
        selectedRows.delete(removed.row_no);
        page = Math.min(page, Math.max(1, Math.ceil(rows.length / PAGE_SIZE)));
        renderTable();
        updateControls();
      }
    });
    $("deleteSelectedFundsButton").addEventListener("click", () => {
      if (!canSelectFundRows() || selectedRows.size === 0) return;
      const deleteCount = selectedRows.size;
      const selected = new Set(selectedRows);
      rows = rows.filter((row) => {
        if (!selected.has(row.row_no)) return true;
        deletedRows.add(row.row_no);
        dirtyRows.delete(row.row_no);
        return false;
      });
      selectedRows.clear();
      page = Math.min(page, Math.max(1, Math.ceil(rows.length / PAGE_SIZE)));
      renderTable();
      updateControls();
      $("status").textContent = `${deleteCount.toLocaleString()}개 펀드를 삭제 대상으로 표시했습니다. 변경 저장을 눌러 Supabase에 반영하세요.`;
    });
    $("prevButton").addEventListener("click", () => { page -= 1; renderTable(); updateControls(); });
    $("nextButton").addEventListener("click", () => { page += 1; renderTable(); updateControls(); });

    async function init() {
      $("title").textContent = `${domainNames[domain]} 정보수정`;
      const response = await fetch("../../data/manual/index.json");
      indexData = await response.json();
      files = indexData.filter((item) => item.domain === domain);
      activeFile = files.find((file) => file.file_key === requestedFileKey) || files[0];
      activeSheet = activeFile.sheets[0];
      if (domain === "mezzanine" && activeFile.file_key === "fund_info") {
        $("title").textContent = "메자닌 펀드정보수정";
      }
      try {
        const client = await getSupabase();
        const { data: sessionData, error: sessionError } = await client.auth.getSession();
        if (sessionError) throw sessionError;
        currentUser = sessionData.session?.user ?? null;
        if (currentUser) {
          const { data: profile, error: profileError } = await client.from("user_profiles")
            .select("username,role,must_change_password")
            .eq("user_id", currentUser.id)
            .maybeSingle();
          if (profileError) throw profileError;
          mustChangePassword = profile?.must_change_password ?? true;
          $("authStatus").textContent = profile ? `${profile.username} · ${profile.role}` : currentUser.email;
          $("loadDbButton").disabled = mustChangePassword;
        } else {
          $("authStatus").textContent = "메인 화면에서 로그인한 뒤 다시 열어주세요.";
        }
      } catch (error) {
        $("authStatus").textContent = `세션 확인 실패: ${error.message}`;
      }
      await switchData();
      await subscribeRealtime();
    }

    init().catch((error) => { $("status").textContent = `초기화 실패: ${error.message}`; });
  </script>
</body>
</html>
