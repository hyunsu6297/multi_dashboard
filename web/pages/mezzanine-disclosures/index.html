<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>보유종목 공시정보조회</title>
<style>:root{--deep:#004d40;--line:#087061;--bg:#eef5f3}*{box-sizing:border-box}body{margin:0;font:12px "Malgun Gothic",sans-serif;background:var(--bg);color:#173a34}header{height:70px;background:#fff;border-bottom:10px solid var(--deep);display:flex;align-items:center;gap:9px;padding:0 15px}h1{margin:0 18px 0 0;font-size:25px}button,a{border:1px solid var(--line);border-radius:4px;background:#eef7f4;color:#073f37;padding:7px 11px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:var(--deep);color:#fff}.status{margin-left:auto}.tools{display:flex;gap:8px;padding:9px 12px;background:#fff}.tools input{width:270px;border:1px solid #9ebbb5;border-radius:4px;padding:6px}.panel{margin:10px;border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:10px}.tablewrap{height:calc(100vh - 155px);overflow:auto}table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}th{position:sticky;top:0;background:var(--deep);color:#fff;padding:6px}td{padding:5px 7px;border-bottom:1px dotted #9cafaa}tr:nth-child(even){background:#f3f7f6}.report{white-space:normal;min-width:360px}.original{color:#075fba;font-weight:800}.empty{text-align:center;padding:70px;color:#71847f}</style></head><body>
<header><h1>보유종목 공시정보조회</h1><a href="../mezzanine/">대시보드</a><button class="primary" id="refresh">최근 1주일 조회</button><span class="status" id="status">대기 중</span></header>
<div class="tools"><input id="search" placeholder="회사명·보고서명 검색"><span>현재 보유한 메자닌 발행사만 조회 · 공시일 내림차순</span></div>
<main class="panel"><div class="tablewrap"><table><thead><tr><th>공시일</th><th>회사명</th><th>보고서명</th><th>제출인</th><th>비고</th><th>원문</th></tr></thead><tbody id="rows"></tbody></table></div></main>
<script type="module">
const URL='https://esqakvzvchcunhzjlyry.supabase.co',KEY='sb_publishable_T0q_8mB9yzcitTL7HH0SuA_W4DUcVtP',$=s=>document.querySelector(s);let disclosures=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function render(){let q=$('#search').value.toLowerCase(),list=disclosures.filter(x=>!q||[x.corp_name,x.report_nm].join(' ').toLowerCase().includes(q));$('#rows').innerHTML=list.length?list.map(x=>`<tr><td>${esc(x.rcept_dt)}</td><td>${esc(x.corp_name)}</td><td class="report">${esc(x.report_nm)}</td><td>${esc(x.flr_nm)}</td><td>${esc(x.rm)}</td><td><a class="original" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">원문 보기</a></td></tr>`).join(''):'<tr><td colspan="6" class="empty">최근 1주일 공시가 없습니다.</td></tr>';$('#status').textContent=`공시 ${list.length}건`}
async function load(){let client=window.parent!==window&&window.parent.dashboardSupabase;if(!client){const {createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');client=createClient(URL,KEY,{auth:{persistSession:true,autoRefreshToken:true}})}let session=(await client.auth.getSession()).data.session;if(!session)throw Error('메인 화면에서 로그인한 뒤 다시 열어주세요.');let {data,error}=await client.from('manual_file_rows').select('payload').eq('domain','mezzanine').eq('file_key','disclosures').order('row_no');if(error)throw error;disclosures=data.map(x=>x.payload).sort((a,b)=>String(b.rcept_dt).localeCompare(String(a.rcept_dt)));render()}
$('#refresh').onclick=()=>load().catch(e=>$('#status').textContent=e.message);$('#search').oninput=render;load().catch(e=>$('#status').textContent=e.message);
</script></body></html>
