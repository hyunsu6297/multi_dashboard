<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>멀티에셋운용팀 대시보드</title>
  <style>
    :root {
      --sidebar: #0f172a;
      --sidebar-2: #111827;
      --ink: #172026;
      --muted: #6b7280;
      --line: #d8dee8;
      --panel: #ffffff;
      --wash: #f3f6f9;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      color: var(--ink);
      background: var(--wash);
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 204px minmax(0, 1fr);
    }

    .sidebar {
      min-width: 0;
      background: linear-gradient(180deg, var(--sidebar), var(--sidebar-2));
      color: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand { display: none; }

    .brand strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .nav {
      padding: 14px 12px 20px;
      overflow: auto;
    }

    .group {
      margin: 0 0 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .group-title {
      margin: 0 8px 8px;
      color: #e5edf5;
      font-size: 14px;
      font-weight: 850;
    }

    .nav button {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: 7px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: #cbd5e1;
      font: inherit;
      font-size: 12px;
      font-weight: 750;
      text-align: left;
      cursor: pointer;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }

    .nav .sub {
      margin-left: 12px;
      width: calc(100% - 12px);
    }

    .content {
      min-width: 0;
      height: 100%;
      display: grid;
      grid-template-rows: 58px minmax(0, 1fr);
    }

    .topbar {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0 0 3px;
      font-size: 17px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }

    .actions a,
    .actions button {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #26323d;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .actions a.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .frame-wrap {
      min-width: 0;
      min-height: 0;
      padding: 10px;
      background: #e9eef3;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      display: block;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #e9eef3;
    }

    .login-screen[hidden],
    .app[hidden] { display: none; }

    .login-panel {
      width: min(400px, 100%);
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    .login-panel h1 { margin: 0 0 8px; font-size: 24px; }
    .login-panel p { margin: 0 0 24px; color: var(--muted); font-size: 13px; }
    .login-panel label { display: block; margin: 14px 0 6px; font-size: 13px; font-weight: 800; }
    .login-panel input {
      width: 100%;
      height: 42px;
      padding: 0 11px;
      border: 1px solid #c8d1dc;
      border-radius: 6px;
      font: inherit;
    }
    .login-panel button {
      width: 100%;
      height: 42px;
      margin-top: 20px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .login-panel button:disabled { opacity: .55; cursor: default; }
    .login-status { min-height: 18px; margin-top: 12px; color: #b42318; font-size: 12px; }
    .login-panel [hidden] { display: none; }
    .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin: 18px 0; padding: 4px; background: var(--wash); border-radius: 6px; }
    .auth-tabs button { height: 34px; margin: 0; background: transparent; color: var(--muted); }
    .auth-tabs button.active { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .login-panel button.secondary { margin-top: 10px; border: 1px solid var(--line); background: #fff; color: var(--ink); }
    .approval-panel { text-align: center; }
    .approval-panel strong { display: block; margin: 12px 0 8px; font-size: 18px; }
    .user-label { color: var(--muted); font-size: 12px; font-weight: 700; }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .app {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
      }
      .content {
        height: calc(100vh - 190px);
        min-height: 620px;
      }
      .sidebar { max-height:118px; overflow:auto; }
      .nav { display:flex; gap:6px; padding:8px; overflow-x:auto; }
      .group { flex:0 0 auto; margin:0; padding:0 8px 0 0; border-bottom:0; border-right:1px solid rgba(255,255,255,.1); }
      .group-title { margin:0 4px 4px; font-size:11px; }
      .nav button { width:auto; height:30px; padding:0 8px; white-space:nowrap; }
      .nav .sub { margin-left:0; width:auto; }
      .topbar {
        min-height: 72px;
        align-items: flex-start;
        padding: 10px 12px;
        flex-direction: column;
      }
      .actions { width:100%; overflow-x:auto; }
      .actions a,.actions button { flex:0 0 auto; }
      .frame-wrap { padding:4px; }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-panel">
      <h1>멀티에셋운용팀 대시보드</h1>
      <div class="auth-tabs" id="authTabs">
        <button type="button" data-auth-mode="login" class="active">로그인</button>
        <button type="button" data-auth-mode="signup">회원가입</button>
      </div>
      <form id="loginForm" class="login-form-fields">
        <label for="loginId">이메일</label>
        <input id="loginId" autocomplete="username" placeholder="name@gmail.com" required autofocus>
        <label for="loginPassword">비밀번호</label>
        <input id="loginPassword" type="password" autocomplete="current-password" required>
        <button id="loginButton" type="submit">로그인</button>
        <button id="googleLoginButton" class="secondary" type="button">Google로 계속</button>
      </form>
      <form id="signupForm" hidden>
        <label for="signupEmail">이메일</label>
        <input id="signupEmail" type="email" autocomplete="email" placeholder="name@gmail.com" required>
        <label for="signupPassword">비밀번호</label>
        <input id="signupPassword" type="password" autocomplete="new-password" minlength="8" required>
        <label for="signupPasswordConfirm">비밀번호 확인</label>
        <input id="signupPasswordConfirm" type="password" autocomplete="new-password" minlength="8" required>
        <button id="signupButton" type="submit">가입 신청</button>
      </form>
      <div id="approvalPanel" class="approval-panel" hidden>
        <strong id="approvalTitle">관리자 승인 대기 중</strong>
        <p id="approvalMessage"></p>
        <button id="approvalLogoutButton" class="secondary" type="button">로그아웃</button>
      </div>
      <div class="login-status" id="loginStatus" role="alert"></div>
    </div>
  </section>

  <div class="app" id="app" hidden>
    <aside class="sidebar">
      <div class="brand">
        <strong></strong>
      </div>
      <nav class="nav" aria-label="멀티에셋운용팀 대시보드 메뉴">
        <section class="group">
          <div class="group-title">1. 주식 대시보드</div>
          <button type="button" class="sub active" data-page="stock-dashboard">대시보드</button>
          <button type="button" class="sub" data-page="stock-edit">정보수정</button>
        </section>
        <section class="group">
          <div class="group-title">2. 채권대시보드</div>
          <button type="button" class="sub" data-page="bond-dashboard">대시보드</button>
          <button type="button" class="sub" data-page="bond-edit">정보수정</button>
        </section>
        <section class="group">
          <div class="group-title">3. 메자닌대시보드</div>
          <button type="button" class="sub" data-page="mezzanine-dashboard">대시보드</button>
          <button type="button" class="sub" data-page="mezzanine-edit">종목정보수정</button>
          <button type="button" class="sub" data-page="mezzanine-fund-edit">펀드정보수정</button>
        </section>
        <section class="group">
          <div class="group-title">4. 펀드차트</div>
          <button type="button" class="sub" data-page="fund-dashboard">대시보드</button>
          <button type="button" class="sub" data-page="fund-edit">정보수정</button>
        </section>
        <section class="group">
          <div class="group-title">5. 액티브ETF 분석</div>
          <button type="button" data-page="etf-dashboard">대시보드</button>
        </section>
        <section class="group" id="adminMenu" hidden>
          <div class="group-title">6. Admin</div>
          <button type="button" data-page="admin-members">회원 관리</button>
        </section>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="title">
          <h1 id="pageTitle">멀티에셋운용팀 | 주식 & 수익증권 대시보드</h1>
          <p id="pageNote">기존 주식 대시보드 결과물</p>
        </div>
        <div class="actions">
          <span class="user-label" id="userLabel"></span>
          <button type="button" id="reloadButton">새로고침</button>
          <a id="openButton" class="primary" href="pages/stock/index.html" target="_blank" rel="noopener">새 탭 열기</a>
          <button type="button" id="logoutButton">로그아웃</button>
        </div>
      </header>
      <section class="frame-wrap">
        <iframe id="dashboardFrame" src="pages/stock/index.html" title="주식 & 수익증권 대시보드"></iframe>
      </section>
    </main>
  </div>

  <script type="module">
    const SUPABASE_URL = "https://esqakvzvchcunhzjlyry.supabase.co";
    const SUPABASE_KEY = "sb_publishable_T0q_8mB9yzcitTL7HH0SuA_W4DUcVtP";
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });
    window.dashboardSupabase = supabase;
    const pages = {
      "stock-dashboard": {
        title: "주식 & 수익증권 대시보드",
        note: "기존 주식 대시보드 결과물",
        src: "pages/stock/index.html"
      },
      "stock-edit": {
        title: "주식 대시보드 정보수정",
        note: "주식 대시보드에서 엑셀로 관리하던 수기 입력 항목",
        src: "pages/manual-edit/index.html?domain=stock"
      },
      "bond-dashboard": {
        title: "채권형수익증권 대시보드",
        note: "기존 채권대시보드 결과물",
        src: "pages/bond/index.html"
      },
      "bond-edit": {
        title: "채권대시보드 정보수정",
        note: "채권대시보드에서 엑셀로 관리하던 수기 입력 항목",
        src: "pages/manual-edit/index.html?domain=bond"
      },
      "mezzanine-dashboard": {
        title: "메자닌 수익증권 대시보드",
        note: "공유 보유·매매 데이터와 메자닌 기준가를 결합한 대시보드",
        src: "pages/mezzanine/index.html"
      },
      "mezzanine-edit": {
        title: "메자닌 종목정보수정",
        note: "메자닌 종목정보·동일종목 연결·델타 계산 상세",
        src: "pages/mezzanine-admin/"
      },
      "mezzanine-fund-edit": {
        title: "메자닌 펀드정보수정",
        note: "메자닌 펀드의 운용사·지분율·장부가·평가금액 관리",
        src: "pages/manual-edit/index.html?domain=mezzanine&file=fund_info"
      },
      "fund-dashboard": {
        title: "펀드 일별 수익률 대시보드",
        note: "기존 펀드차트 결과물",
        src: "pages/fund/index.html"
      },
      "fund-edit": {
        title: "펀드차트 정보수정",
        note: "펀드차트에서 엑셀로 관리하던 Hana_EMP, BM, 매핑 정보",
        src: "pages/manual-edit/index.html?domain=fund"
      },
      "etf-dashboard": {
        title: "액티브ETF 분석",
        note: "기존 ETF Weight Dashboard 결과물",
        src: "pages/etf/index.html"
      },
      "admin-members": {
        title: "회원 관리",
        note: "가입 승인 및 회원별 권한 관리",
        src: "pages/admin/index.html"
      }
    };

    const frame = document.getElementById("dashboardFrame");
    const pageTitle = document.getElementById("pageTitle");
    const pageNote = document.getElementById("pageNote");
    const openButton = document.getElementById("openButton");
    const reloadButton = document.getElementById("reloadButton");
    const loginScreen = document.getElementById("loginScreen");
    const app = document.getElementById("app");

    let currentUser = null;
    let currentProfile = null;
    let currentPageKey = "stock-dashboard";
    let liveStockVersion = "";
    let liveStockObjectUrl = "";

    async function refreshLiveStock(force = false) {
      if (!currentUser || currentPageKey !== "stock-dashboard") return;
      try {
        const { data: versionRow, error: versionError } = await supabase
          .from("dashboard_live_versions")
          .select("version,storage_bucket,storage_path")
          .eq("dashboard_key", "stock")
          .maybeSingle();
        if (versionError || !versionRow) return;
        if (!force && versionRow.version === liveStockVersion) return;
        const { data: blob, error: downloadError } = await supabase.storage
          .from(versionRow.storage_bucket)
          .download(versionRow.storage_path);
        if (downloadError || !blob) return;
        const htmlBlob = new Blob([await blob.arrayBuffer()], { type: "text/html;charset=utf-8" });
        const nextUrl = URL.createObjectURL(htmlBlob);
        frame.src = nextUrl;
        if (liveStockObjectUrl) URL.revokeObjectURL(liveStockObjectUrl);
        liveStockObjectUrl = nextUrl;
        liveStockVersion = versionRow.version;
      } catch (error) {
        console.warn("주식 실시간 대시보드 갱신 실패, 배포 스냅샷을 유지합니다.", error.message);
      }
    }

    async function handleAuthenticatedUser(user) {
      currentUser = user;
      const { data: profile, error } = await supabase.from("user_profiles")
        .select("username,email,role,must_change_password,status").eq("user_id", user.id).maybeSingle();
      if (error || !profile) {
        showLogin();
        document.getElementById("loginStatus").textContent = "사용자 권한 정보를 확인할 수 없습니다.";
        return;
      }
      currentProfile = profile;
      if (profile.status !== "approved" || profile.must_change_password) {
        showApproval(profile);
        return;
      }
      document.getElementById("userLabel").textContent = `${profile.email || user.email} · ${profile.role}`;
      document.getElementById("adminMenu").hidden = profile.role !== "admin";
      loginScreen.hidden = true;
      app.hidden = false;
      if (currentPageKey === "admin-members" && profile.role !== "admin") {
        await showPage("stock-dashboard");
      }
      await refreshLiveStock(true);
    }

    function setAuthMode(mode) {
      document.querySelectorAll("[data-auth-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.authMode === mode);
      });
      document.getElementById("loginForm").hidden = mode !== "login";
      document.getElementById("signupForm").hidden = mode !== "signup";
      document.getElementById("approvalPanel").hidden = true;
      document.getElementById("loginStatus").textContent = "";
    }

    function showApproval(profile) {
      app.hidden = true;
      loginScreen.hidden = false;
      document.getElementById("authTabs").hidden = true;
      document.getElementById("loginForm").hidden = true;
      document.getElementById("signupForm").hidden = true;
      document.getElementById("approvalPanel").hidden = false;
      const labels = {
        pending: ["관리자 승인 대기 중", "가입 신청이 접수되었습니다. 관리자가 승인하면 대시보드를 이용할 수 있습니다."],
        rejected: ["가입 신청이 반려되었습니다", "관리자에게 계정 승인을 문의해 주세요."],
        suspended: ["계정 이용이 중지되었습니다", "관리자에게 계정 상태를 문의해 주세요."]
      };
      const fallback = profile.must_change_password
        ? ["계정 확인이 필요합니다", "관리자에게 초기 계정 설정을 문의해 주세요."]
        : ["계정 확인이 필요합니다", "관리자에게 계정 상태를 문의해 주세요."];
      const [title, message] = labels[profile.status] || fallback;
      document.getElementById("approvalTitle").textContent = title;
      document.getElementById("approvalMessage").textContent = message;
      document.getElementById("loginStatus").textContent = "";
    }

    function showLogin() {
      currentUser = null;
      currentProfile = null;
      app.hidden = true;
      loginScreen.hidden = false;
      document.getElementById("authTabs").hidden = false;
      document.getElementById("adminMenu").hidden = true;
      document.getElementById("loginPassword").value = "";
      setAuthMode("login");
    }

    document.querySelectorAll("[data-auth-mode]").forEach((button) => {
      button.addEventListener("click", () => setAuthMode(button.dataset.authMode));
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const button = document.getElementById("loginButton");
      const status = document.getElementById("loginStatus");
      const loginId = document.getElementById("loginId").value.trim();
      const email = (loginId.includes("@") ? loginId : `${loginId}@multiasset.local`).toLowerCase();
      button.disabled = true;
      status.textContent = "로그인 중입니다.";
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: document.getElementById("loginPassword").value
      });
      button.disabled = false;
      if (error) {
        status.textContent = "이메일 또는 비밀번호를 확인하세요.";
        return;
      }
      status.textContent = "";
      await handleAuthenticatedUser(data.user);
      await refreshLiveStock(true);
    });

    document.getElementById("signupForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = document.getElementById("signupEmail").value.trim().toLowerCase();
      const password = document.getElementById("signupPassword").value;
      const confirmation = document.getElementById("signupPasswordConfirm").value;
      const status = document.getElementById("loginStatus");
      if (password.length < 8 || !/[^A-Za-z0-9]/.test(password)) {
        status.textContent = "비밀번호는 8자 이상이며 특수문자를 포함해야 합니다.";
        return;
      }
      if (password !== confirmation) {
        status.textContent = "비밀번호 확인이 일치하지 않습니다.";
        return;
      }
      const button = document.getElementById("signupButton");
      button.disabled = true;
      status.textContent = "가입 신청을 처리하고 있습니다.";
      const redirectTo = `${location.origin}${location.pathname}`;
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: redirectTo }
      });
      button.disabled = false;
      if (error) {
        status.textContent = `가입 신청 실패: ${error.message}`;
        return;
      }
      document.getElementById("signupPassword").value = "";
      document.getElementById("signupPasswordConfirm").value = "";
      if (data.session?.user) await handleAuthenticatedUser(data.session.user);
      else status.textContent = "확인 이메일을 보냈습니다. 이메일 인증 후 관리자 승인을 기다려 주세요.";
    });

    document.getElementById("googleLoginButton").addEventListener("click", async () => {
      const status = document.getElementById("loginStatus");
      status.textContent = "Google 로그인으로 이동합니다.";
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: `${location.origin}${location.pathname}` }
      });
      if (error) status.textContent = `Google 로그인 실패: ${error.message}`;
    });

    document.getElementById("approvalLogoutButton").addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLogin();
    });

    document.getElementById("logoutButton").addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLogin();
    });

    async function showPage(key) {
      if (key === "admin-members" && currentProfile?.role !== "admin") key = "stock-dashboard";
      const page = pages[key];
      if (!page) return;
      currentPageKey = key;
      document.querySelectorAll("[data-page]").forEach((button) => {
        button.classList.toggle("active", button.dataset.page === key);
      });
      pageTitle.textContent = `멀티에셋운용팀 | ${page.title}`;
      pageNote.textContent = page.note;
      frame.src = page.src;
      frame.title = page.title;
      openButton.href = page.src;
      location.hash = key;
      if (key === "stock-dashboard") await refreshLiveStock(true);
    }

    document.querySelectorAll("[data-page]").forEach((button) => {
        button.addEventListener("click", () => showPage(button.dataset.page));
    });

    reloadButton.addEventListener("click", () => {
      frame.contentWindow.location.reload();
    });

    const initial = location.hash.replace("#", "");
    await showPage(pages[initial] ? initial : "stock-dashboard");
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) await handleAuthenticatedUser(session.user);
    else showLogin();
    setInterval(() => refreshLiveStock(), 20000);
  </script>
</body>
</html>
