name: Daily data and dashboard deployment

on:
  workflow_dispatch:
    inputs:
      business_date:
        description: Business date (YYYY-MM-DD). Leave empty for previous weekday.
        required: false
        type: string
  schedule:
    - cron: "30 22 * * 0-4"

permissions:
  contents: read

concurrency:
  group: kfr-daily-source-import
  cancel-in-progress: false

jobs:
  download-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KFROM_ID: ${{ secrets.KFROM_ID }}
      KFROM_PASSWORD: ${{ secrets.KFROM_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      KIWOOM_APPKEY: ${{ secrets.KIWOOM_APPKEY }}
      KIWOOM_SECRETKEY: ${{ secrets.KIWOOM_SECRETKEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/kfr/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r automation/kfr/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Download previous business day from KFR
        shell: bash
        run: |
          args=(--output-dir "$RUNNER_TEMP/kfr")
          if [[ -n "${{ inputs.business_date }}" ]]; then
            args+=(--holding-date "${{ inputs.business_date }}")
            args+=(--trade-start-date "${{ inputs.business_date }}")
            args+=(--trade-end-date "${{ inputs.business_date }}")
          fi
          python automation/kfr/kfr_download.py "${args[@]}"

      - name: Upload rows to Supabase
        shell: bash
        run: |
          args=(--input-dir "$RUNNER_TEMP/kfr")
          if [[ -n "${{ inputs.business_date }}" ]]; then
            args+=(--business-date "${{ inputs.business_date }}")
          fi
          python automation/kfr/supabase_upload.py "${args[@]}"

      - name: Restore dashboard inputs from Supabase
        run: python scripts/restore_dashboard_inputs.py

      - name: Refresh Kiwoom quotes when available
        id: kiwoom_quotes
        continue-on-error: true
        run: python apps/stock/fetch_kiwoom_quotes.py --once

      - name: Warn when Kiwoom blocks the hosted runner
        if: steps.kiwoom_quotes.outcome == 'failure'
        run: echo "Kiwoom quote refresh was blocked; building with the latest Supabase source data."

      - name: Build stock dashboard
        run: python apps/stock/build_fund_dashboard.py

      - name: Build bond dashboard
        run: python apps/bond/build_dashboard.py

      - name: Assemble Cloudflare Pages site
        run: python scripts/assemble_site.py

      - name: Upload dashboard build artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-dashboard-site
          path: dist
          retention-days: 7

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=multi-dashboard --branch=main

