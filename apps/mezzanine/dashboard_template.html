<script>
const DATA=window.MEZZ_DATA=__DATA__, $=s=>document.querySelector(s), fmt=(n,d=0)=>Number(n||0).toLocaleString('ko-KR',{maximumFractionDigits:d}), pct=n=>n==null?'—':(Number(n)*100).toFixed(1)+'%', won=n=>fmt(Number(n||0)/1e8)+'억', won2=n=>(Number(n||0)/1e8).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})+'억', cls=n=>n>0?'pos':n<0?'neg':'';

function render(){let allFunds=uniq(DATA.holdings.map(x=>x.fund)),eligible=new Set(DATA.holdings.filter(x=>!state.manager.size||state.manager.has(x.manager)).map(x=>x.fund));[...state.fund].forEach(v=>{if(!eligible.has(v))state.fund.delete(v)});chipGroup('fund',$('#fundChips'),[...allFunds.filter(x=>eligible.has(x)),...allFunds.filter(x=>!eligible.has(x))],eligible);syncChips();let h=filteredHold(),stock=DATA.stockHoldings.filter(inFilter),total=h.reduce((s,x)=>s+x.lookthrough,0),dx=h.reduce((s,x)=>s+x.deltaExposure,0),mezzPL=h.reduce((s,x)=>s+x.estimatedPnl,0),stockPL=stock.reduce((s,x)=>s+x.pnl,0);let funds=DATA.funds.filter(x=>(!state.manager.size||state.manager.has(x['운용사']))&&(!state.fund.size||state.fund.has(x['펀드명']))),fundBook=funds.reduce((s,x)=>s+Number(x['장부가']||0),0),delta=total?dx/total:0;
let cards=[['총익스포져',won(total)],['델타익스포져',won(dx)],['펀드장부가(당행)',won(fundBook)],['델타',pct(delta)],['종목수(메자닌)',new Set(h.map(x=>x.instrumentId)).size+'개'],['예상PL(전체)',won2(mezzPL+stockPL)],['메자닌PL',won2(mezzPL)],['주식PL',won2(stockPL)]];$('#kpis').innerHTML=cards.map(x=>`<div class="kpi"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');

table($('#holdTable'),'hold',[
['펀드명','fund',x=>x.fund],['메자닌명','name',x=>x.name+(x.needsRegistration?`<a class="regBadge" href="../manual-edit/index.html?domain=mezzanine&amp;newName=${encodeURIComponent(x.name)}&newCode=${encodeURIComponent(x.code)}&newType=${encodeURIComponent(x.type)}&newIssuer=${encodeURIComponent(x.issuer||'')}&newIssuerCode=${encodeURIComponent(x.issuerCode||'')}" onclick="event.stopPropagation()">등록필요</a>`:''),'','',null,x=>x.name],['교환대상명','underlying',x=>x.underlying||'—','','',null,x=>x.underlying],['편입일','date',x=>x.date,'center'],['전환시작일','conversionStart',x=>x.conversionStart||'(비어 있음)','center'],['PUT일자','putDate',x=>x.putDate||'(비어 있음)','center'],['등락률','underlyingChange',x=>rateBar(x.underlyingChange),'center','',x=>x.underlyingChange],['패리티','parity',x=>pct(x.parity),'center',x=>x.parity>1?'hot':''],['델타','delta',x=>pct(x.delta),'center',x=>x.delta>1?'hot':''],['손익(억)','estimatedPnl',x=>fmt(x.estimatedPnl/1e8,2),'center','',x=>x.estimatedPnl],['금액(펀드)','value',x=>fmt(x.value/1e8,1),'center'],['금액(실보유)','lookthrough',x=>fmt(x.lookthrough/1e8,1),'center'],['델타익스포져','deltaExposure',x=>fmt(x.deltaExposure/1e8,1),'center']],h);

async function hydrateFromSupabase(){
  try{
    let client=window.parent!==window&&window.parent.dashboardSupabase;
    if(!client)return;
    const {data:{session}}=await client.auth.getSession();
    if(!session)return;
    const instrumentRows=[];
    for(const fileKey of ['instrument_info','instrument_additions']){
      for(let start=0;;start+=1000){
        const {data,error}=await client.from('manual_file_rows').select('payload').eq('domain','mezzanine').eq('file_key',fileKey).order('row_no').range(start,start+999);
        if(error)throw error; instrumentRows.push(...data.map(x=>x.payload)); if(data.length<1000)break;
      }
    }
    const fundRows=[];
    for(let start=0;;start+=1000){
      const {data,error}=await client.from('manual_file_rows').select('payload').eq('domain','mezzanine').eq('file_key','fund_info').order('row_no').range(start,start+999);
      if(error)throw error; fundRows.push(...data.map(x=>x.payload)); if(data.length<1000)break;
    }
    if(fundRows.length)window.MEZZ_DATA.funds=fundRows;
    const byCode=new Map(instrumentRows.map(x=>[String(x['KR코드']||'').trim(),x]));
    for(const h of window.MEZZ_DATA.holdings){
      const m=byCode.get(String(h.code||'').trim()); if(!m)continue;
      h.issuer=m['발행사명']||h.issuer; h.underlying=m['교환대상명']||h.underlying;
      h.underlyingCode=String(m['교환코드']||m['발행코드']||h.underlyingCode||'').padStart(6,'0');
      h.conversionStart=String(m['전환시작일']||h.conversionStart||'').slice(0,10);
      h.putDate=String(m['PUT']||h.putDate||'').slice(0,10); h.needsRegistration=false;
      h._conversionPrice=Number(m['전환가']||0);
    }
    const codes=[...new Set(window.MEZZ_DATA.holdings.map(x=>x.underlyingCode).filter(Boolean))];
    for(let start=0;start<codes.length;start+=100){
      const {data,error}=await client.from('kiwoom_realtime_quotes').select('code,price,change_rate').in('code',codes.slice(start,start+100));
      if(error)throw error; const quotes=new Map(data.map(x=>[x.code,x]));
      for(const h of window.MEZZ_DATA.holdings){const q=quotes.get(h.underlyingCode);if(!q)continue;h.underlyingPrice=Number(q.price);h.underlyingChange=q.change_rate==null?null:Number(q.change_rate)/100;h.parity=h._conversionPrice?h.underlyingPrice/h._conversionPrice:h.parity;h.estimatedPnl=h.lookthrough*(h.underlyingChange||0)*h.delta;}
    }
    const securityCodes=[...new Set(window.MEZZ_DATA.holdings.map(x=>String(x.code||'').trim()).filter(Boolean))];
    for(let start=0;start<securityCodes.length;start+=100){
      const {data,error}=await client.from('mezzanine_delta_history').select('business_date,security_code,daily_delta,is_valid').in('security_code',securityCodes.slice(start,start+100)).order('business_date',{ascending:false}).limit(1000);
      if(error)throw error; const grouped=new Map();
      for(const x of data){if(!grouped.has(x.security_code))grouped.set(x.security_code,new Map());const dates=grouped.get(x.security_code);if(!dates.has(x.business_date))dates.set(x.business_date,[]);if(x.is_valid&&x.daily_delta!=null)dates.get(x.business_date).push(Number(x.daily_delta));}
      for(const h of window.MEZZ_DATA.holdings){const dates=grouped.get(String(h.code||'').trim());if(!dates)continue;const recent=[...dates.entries()].slice(0,10),values=recent.flatMap(([,v])=>v);if(!values.length)continue;h.delta=values.reduce((a,b)=>a+b,0)/values.length;h.deltaExposure=h.lookthrough*h.delta;h.estimatedPnl=h.lookthrough*(h.underlyingChange||0)*h.delta;}
    }
    render();
  }catch(error){console.warn('Supabase 메자닌 동기화 실패, 내장 스냅샷을 사용합니다.',error.message)}
}
